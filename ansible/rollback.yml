---
- name: Rollback serveur web (SRVWEB)
  hosts: SRVWEB
  become: yes
  tasks:
    - name: Mettre à jour les paquets
      apt:
        update_cache: yes

    - name: Installer nginx si absent
      apt:
        name: nginx
        state: present

    - name: Créer le dossier web si absent
      file:
        path: /var/www/html
        state: directory
        mode: '0755'

    - name: Restaurer la page index.html par défaut (sans supprimer calculatrice.html)
      copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="UTF-8">
              <title>Rollback effectué</title>
              <style>
                  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
                  h1 { color: #e74c3c; }
              </style>
          </head>
          <body>
              <h1>Rollback effectué : Page par défaut restaurée</h1>
              <p>La calculatrice est toujours accessible <a href="calculatrice.html">ici</a>.</p>
          </body>
          </html>

    - name: S'assurer que nginx est démarré
      service:
        name: nginx
        state: started
        enabled: yes

- name: Rollback base de données (SRVDATA)
  hosts: SRVDATA
  become: yes
  tasks:
    - name: Mettre à jour les paquets
      apt:
        update_cache: yes

    - name: Installer MariaDB si absent
      apt:
        name: mariadb-server
        state: present

    - name: S'assurer que MariaDB est démarré
      service:
        name: mariadb
        state: started
        enabled: yes

