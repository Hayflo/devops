---
- name: Déploiement serveur web avec application métier (calculatrice)
  hosts: SRVWEB
  become: yes
  tasks:
    - name: Mettre à jour les paquets
      apt:
        update_cache: yes

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: S'assurer que nginx est démarré
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Créer le dossier web si absent
      file:
        path: /var/www/html
        state: directory
        mode: '0755'

    - name: Déployer la page d'accueil avec bouton vers la calculatrice
      copy:
        dest: /var/www/html/index.html
        content: |
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="UTF-8">
              <title>Application Métier</title>
              <style>
                  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
                  h1 { color: #2c3e50; }
                  button {
                      background-color: #3498db;
                      color: white;
                      border: none;
                      padding: 10px 20px;
                      font-size: 16px;
                      cursor: pointer;
                      border-radius: 5px;
                  }
                  button:hover { background-color: #2980b9; }
              </style>
          </head>
          <body>
              <h1>Bienvenue sur l'application métier</h1>
              <p>Cliquez ci-dessous pour accéder à la calculatrice</br><p>test</p> :</p>
              <button onclick="window.location.href='calculatrice.html'">Ouvrir la calculatrice</button>
          </body>
          </html>

    - name: Déployer l'application calculatrice
      copy:
        dest: /var/www/html/calculatrice.html
        content: |
          <!DOCTYPE html>
          <html lang="fr">
          <head>
              <meta charset="UTF-8">
              <title>Calculatrice</title>
              <style>
                  body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
                  .calculatrice {
                      display: inline-block;
                      border: 2px solid #3498db;
                      padding: 20px;
                      border-radius: 10px;
                      background-color: #f9f9f9;
                  }
                  input[type="text"] {
                      width: 200px;
                      padding: 10px;
                      font-size: 18px;
                      margin-bottom: 10px;
                      text-align: right;
                  }
                  button {
                      width: 50px;
                      height: 50px;
                      font-size: 18px;
                      margin: 2px;
                      cursor: pointer;
                      background-color: #e0e0e0;
                      border: 1px solid #ccc;
                      border-radius: 5px;
                  }
                  button:hover { background-color: #d0d0d0; }
                  .operator { background-color: #3498db; color: white; }
                  .operator:hover { background-color: #2980b9; }
              </style>
          </head>
          <body>
              <div class="calculatrice">
                  <h2>Calculatrice</h2>
                  <input type="text" id="resultat" readonly>
                  <br>
                  <button onclick="ajouterChiffre('7')">7</button>
                  <button onclick="ajouterChiffre('8')">8</button>
                  <button onclick="ajouterChiffre('9')">9</button>
                  <button class="operator" onclick="ajouterOperateur('/')">/</button>
                  <br>
                  <button onclick="ajouterChiffre('4')">4</button>
                  <button onclick="ajouterChiffre('5')">5</button>
                  <button onclick="ajouterChiffre('6')">6</button>
                  <button class="operator" onclick="ajouterOperateur('*')">*</button>
                  <br>
                  <button onclick="ajouterChiffre('1')">1</button>
                  <button onclick="ajouterChiffre('2')">2</button>
                  <button onclick="ajouterChiffre('3')">3</button>
                  <button class="operator" onclick="ajouterOperateur('-')">-</button>
                  <br>
                  <button onclick="ajouterChiffre('0')">0</button>
                  <button onclick="ajouterChiffre('.')">.</button>
                  <button onclick="calculer()">=</button>
                  <button class="operator" onclick="ajouterOperateur('+')">+</button>
                  <br>
                  <button onclick="effacer()">C</button>
              </div>

              <script>
                  function ajouterChiffre(chiffre) {
                      document.getElementById('resultat').value += chiffre;
                  }

                  function ajouterOperateur(operateur) {
                      document.getElementById('resultat').value += operateur;
                  }

                  function calculer() {
                      try {
                          document.getElementById('resultat').value = eval(document.getElementById('resultat').value);
                      } catch (e) {
                          document.getElementById('resultat').value = "Erreur";
                      }
                  }

                  function effacer() {
                      document.getElementById('resultat').value = "";
                  }
              </script>
          </body>
          </html>

- name: Déploiement base de données
  hosts: SRVDATA
  become: yes
  tasks:
    - name: Mettre à jour les paquets
      apt:
        update_cache: yes

    - name: Installer MariaDB
      apt:
        name: mariadb-server
        state: present

    - name: S'assurer que MariaDB est démarré
      service:
        name: mariadb
        state: started
        enabled: yes

